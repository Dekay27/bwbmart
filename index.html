<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Traffic Source</title>
    
    <!-- 1. Stylized layout using a lightweight modern CSS framework -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">

    <!-- 2. Initialize Amplitude with Session Replay and Autocapture -->
    <script>
        function initializeAmplitude() {
            if (!window.amplitude || !window.sessionReplay) {
                console.warn('Amplitude SDK did not load. Button clicks will use the HTTP API fallback.');
                return;
            }

            window.amplitude.add(window.sessionReplay.plugin({sampleRate: 1}));
            window.amplitude.init('c378329053030ac8d3b4c81a3cff6ef0', {
                fetchRemoteConfig: true,
                autocapture: true
            });
        }
    </script>
    <script src="https://cdn.amplitude.com/script/c378329053030ac8d3b4c81a3cff6ef0.js" onload="initializeAmplitude()" onerror="console.warn('Amplitude CDN script failed to load. Button clicks will use the HTTP API fallback.')"></script>
</head>
<body>
    <main class="container" style="max-width: 600px; margin-top: 100px; text-align: center;">
        <hgroup>
            <h1>Welcome to the Tracking Portal</h1>
            <p>Select an option below to test out the clicks tracking pipeline.</p>
        </hgroup>

        <!-- 4. The required CTA elements -->
        <div style="margin-top: 40px; display: flex; gap: 20px; justify-content: center;">
            <button id="signup-btn" class="contrast">Sign Up</button>
            <button id="demo-btn" class="outline">Request Demo</button>
        </div>
    </main>

    <!-- 5. Dynamic tracking script for all buttons -->
    <script>
        function getBrowserDeviceId() {
            var storageKey = 'amplitude_demo_device_id';
            var deviceId = localStorage.getItem(storageKey);

            if (!deviceId) {
                deviceId = 'browser-' + Date.now() + '-' + Math.random().toString(36).slice(2);
                localStorage.setItem(storageKey, deviceId);
            }

            return deviceId;
        }

        function sendViaHttpApi(eventName, properties) {
            return fetch('https://api2.amplitude.com/2/httpapi', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': '*/*'
                },
                body: JSON.stringify({
                    api_key: 'c378329053030ac8d3b4c81a3cff6ef0',
                    events: [{
                        device_id: getBrowserDeviceId(),
                        event_type: eventName,
                        event_properties: properties
                    }]
                })
            });
        }

        function trackButtonClick(button) {
            var buttonName = button.textContent.trim() || button.id || 'Unnamed Button';
            var eventProperties = {
                button_name: buttonName,
                button_id: button.id || null,
                button_class: button.className || null,
                page_title: document.title,
                page_path: window.location.pathname
            };

            if (!window.amplitude || typeof window.amplitude.track !== 'function') {
                console.warn('Amplitude SDK unavailable. Sending event through HTTP API fallback.');
                sendViaHttpApi(buttonName, eventProperties);
                alert(buttonName + ' event sent to Amplitude!');
                return;
            }

            var event = window.amplitude.track(buttonName, eventProperties);

            if (event && event.promise) {
                event.promise
                    .then(function(result) {
                        console.log('Amplitude event sent:', buttonName, result);
                    })
                    .catch(function(error) {
                        console.error('Amplitude SDK send failed. Trying HTTP API fallback.', error);
                        sendViaHttpApi(buttonName, eventProperties);
                    });
            }

            alert(buttonName + ' event sent to Amplitude!');
        }

        document.querySelectorAll('button').forEach(function(button) {
            button.addEventListener('click', function() {
                trackButtonClick(button);
            });
        });
    </script>
</body>
</html>
