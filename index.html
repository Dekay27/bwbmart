<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Traffic Source</title>
    
    <!-- 1. Stylized layout using a lightweight modern CSS framework -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">

    <!-- 2. Initialize Amplitude with Session Replay and Autocapture -->
    <script src="https://cdn.amplitude.com/script/c378329053030ac8d3b4c81a3cff6ef0.js"></script><script>window.amplitude.add(window.sessionReplay.plugin({sampleRate: 1}));window.amplitude.init('c378329053030ac8d3b4c81a3cff6ef0', {"fetchRemoteConfig":true,"autocapture":true});</script>
</head>
<body>
    <main class="container" style="max-width: 600px; margin-top: 100px; text-align: center;">
        <hgroup>
            <h1>Welcome to the Demo Portal</h1>
            <p>Select an option below to test out the data pipeline tracking.</p>
        </hgroup>

        <!-- 4. The required CTA elements -->
        <div style="margin-top: 40px; display: flex; gap: 20px; justify-content: center;">
            <button id="signup-btn" class="contrast">Sign Up</button>
            <button id="demo-btn" class="outline">Request Demo</button>
        </div>
    </main>

    <!-- 5. Dynamic tracking script for all buttons -->
    <script>
        document.querySelectorAll('button').forEach(function(button) {
            button.addEventListener('click', function() {
                var buttonName = button.textContent.trim() || button.id || 'Unnamed Button';

                amplitude.track(buttonName, {
                    button_name: buttonName,
                    button_id: button.id || null,
                    button_class: button.className || null,
                    page_title: document.title,
                    page_path: window.location.pathname
                });

                alert(buttonName + ' event sent to Amplitude!');
            });
        });
    </script>
</body>
</html>
